<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>F1 Admin - Ввод результатов</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="fonts.css">
</head>
<body class="admin-page">

<div class="top-btns-box">
  <div class="top-btns">
    <a href="index.html" class="home-btn f1-home-btn" title="На главную">
      <img src="images/f1-logo.svg" alt="F1" class="f1-logo">
    </a>

    <a href="admin.html" id="adminBtn" class="top-link-btn admin-link">Admin</a>
    <a href="table.html" class="top-link-btn table-link">Зачет</a>
    <a href="predict.html" class="top-link-btn predict-link">Прогнозы</a>
  </div>
</div>

<div class="container admin-container">
  <h1>Ввод результатов этапа</h1>
  <p class="subtitle">Только для администратора</p>

  <form id="predictionForm">
    <div class="custom-select" id="stageCustomSelect">
      <div class="selected">Выберите этап</div>
      <div class="dropdown"></div>
    </div>

    <h3>Квалификация (топ-5)</h3>
    <div id="qualifyingContainer"></div>

    <h3>Гонка (топ-10)</h3>
    <div id="raceContainer"></div>

    <button type="submit">Отправить результаты</button>
  </form>
</div>

<iframe name="hidden_iframe" style="display:none;"></iframe>
<div id="toast" class="toast"></div>

<script src="script.js"></script>

<script>
if (sessionStorage.getItem("adminAuth") !== "true") {
  window.location.href = "index.html";
}

document.addEventListener("DOMContentLoaded", () => {
  const form = document.getElementById("predictionForm");
  if (!form || document.getElementById("nickname")) return;

  const hiddenNick = document.createElement("input");
  hiddenNick.type = "hidden";
  hiddenNick.id = "nickname";
  hiddenNick.name = "nickname";
  hiddenNick.value = "admin";
  form.appendChild(hiddenNick);
});
</script>

<div id="successModal" class="modal-overlay">
  <div class="modal-window success-window">
    <div class="success-line">
      <span class="success-check">✓</span>
      <span id="successText" class="success-message"></span>
    </div>
    <button class="modal-btn success-btn" id="successOkBtn">ОК</button>
  </div>
</div>

</body>
</html>
